name: release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --release --locked --target ${{ matrix.target }} -p mufw
      - name: package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf mufw-${{ matrix.target }}.tar.gz mufw
      - uses: actions/upload-artifact@v4
        with:
          name: mufw-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/mufw-${{ matrix.target }}.tar.gz

  publish:
    needs: build
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }
      - name: release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.tar.gz
          generate_release_notes: true

  crates-io:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: publish mufw-core
        run: cargo publish -p mufw-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
      - name: publish mufw
        run: cargo publish -p mufw --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
