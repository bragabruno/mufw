name: release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  guard:
    name: ensure tag is on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: verify tag is reachable from main
        run: |
          git fetch origin main:main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" main; then
            echo "::error::Tag commit $GITHUB_SHA is not on main — refusing to release."
            exit 1
          fi

  build:
    needs: guard
    name: build-${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v3
      - name: build
        run: cargo build --release --locked --target ${{ matrix.target }} -p mufw
      - name: package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf mufw-${{ matrix.target }}.tar.gz mufw
      - uses: actions/upload-artifact@v5
        with:
          name: mufw-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/mufw-${{ matrix.target }}.tar.gz

  publish:
    needs: build
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with: { path: dist }
      - name: release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/**/*.tar.gz
          generate_release_notes: true

  crates-io:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: publish mufw-core
        run: cargo publish -p mufw-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
      - name: publish mufw
        run: cargo publish -p mufw --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
